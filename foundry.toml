# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
bytecode_hash = "none"      # strip metadata IPFS hash (cleaner verify). NOTE: runtime bytecode still differs per
cbor_metadata = false       # chain — the EIP-712 DOMAIN_SEPARATOR bakes in chainId for replay protection. Verify per chain.

allow_internal_expect_revert = true

ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]

[invariant]
runs = 256
depth = 32
fail_on_revert = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
bsc_testnet = "${BSC_TESTNET_RPC_URL}"
bsc = "${BSC_RPC_URL}"
ethereum = "${ETH_RPC_URL}"

[etherscan]
bsc          = { key = "${ETHERSCAN_API_KEY}", chain = 56 }
bsc_testnet  = { key = "${ETHERSCAN_API_KEY}", chain = 97 }
ethereum     = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
